  <!-- small JS for star UI & submit behavior (well commented) -->
  <script>
  /**
   * Star rating UI + Submit handling
   * - Small, self-contained script that:
   *   1) toggles .filled on stars for hover/preview and click
   *   2) stores the selected rating in memory (so you can send it to backend)
   *   3) handles the SUBMIT click and shows a success message (demo)
   *
   * To integrate with backend:
   *  - replace the submit handler to POST the feedback + rating to your endpoint
   *  - on success redirect or show a success state
   */
  (function () {
    const stars = Array.from(document.querySelectorAll('.star'));
    const textarea = document.getElementById('feedback');
    const submitBtn = document.getElementById('submitBtn');
    const successMsg = document.getElementById('successMsg');

    // current selected rating (0..5)
    let rating = 0;

    // helper: paint stars up to value
    function paint(v){
      stars.forEach((s, i) => {
        s.classList.toggle('filled', (i < v));
      });
    }

    // wire hover (preview)
    stars.forEach((btn) => {
      const val = Number(btn.dataset.value);

      btn.addEventListener('mouseenter', () => paint(val));
      btn.addEventListener('mouseleave', () => paint(rating));

      // click selects rating
      btn.addEventListener('click', () => {
        rating = val;
        paint(rating);
        // optional: set aria-checked attributes or update a hidden input if you POST
      });
    });

    // submit handler (demo). Replace with actual fetch/post when backend ready.
    submitBtn.addEventListener('click', () => {
      const feedbackText = textarea.value.trim();

      // Basic client-side validation demo (optional)
      if (!feedbackText && rating === 0) {
        // require at least one of text or rating
        alert('Please provide feedback text or a rating before submitting.');
        return;
      }

      // Demo: show success message and clear UI
      successMsg.classList.add('visible');

      // visually clear input (optional) — comment out if you want the content to remain
      textarea.value = '';
      rating = 0;
      paint(0);

      // If you want to actually send to server:
      // fetch('/api/complaints/123/feedback', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ feedback: feedbackText, rating }) })
      //   .then(r=>r.json()).then(...).catch(...);
    });
  })();
  </script>
